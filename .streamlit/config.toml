# .streamlit/config.toml
# ========================
# Streamlit theme and layout configuration for Retent Engram
#
# HOW TO APPLY:
#   Place this file at: Retent-Engram/.streamlit/config.toml
#   Streamlit reads it automatically on startup — no code needed.
#
# RESTART REQUIRED:
#   After changing this file, stop and restart:
#   Ctrl+C → streamlit run frontend/main.py

[theme]

# Primary accent color — used for buttons, sliders, checkboxes
# This indigo/purple color gives the app a professional, modern feel
primaryColor = "#6C63FF"

# Main background — dark charcoal (not pure black, easier on eyes)
backgroundColor = "#0E1117"

# Sidebar and card background — slightly lighter than main bg
secondaryBackgroundColor = "#1E2130"

# All text color — near-white for contrast on dark backgrounds
textColor = "#FAFAFA"

# Font family — sans serif is clean and readable for technical content
font = "sans serif"


[server]

# Port the app runs on (default 8501)
port = 8501

# Allow connections from any host (needed if running on a VM or WSL)
# Set to false if only running locally for security
headless = false

# Disable usage statistics sent to Streamlit
# Good practice for a student project on college network
gatherUsageStats = false


[browser]

# Tab title prefix — shows in browser tab
serverAddress = "localhost"


[runner]

# Disable the "rerun on file save" magic in production
# Keep true during development (auto-reloads when you save code)
magicEnabled = true